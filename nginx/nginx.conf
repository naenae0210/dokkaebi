server {
    listen 80;
    server_name hangwithus.xyz;

    # Let's Encrypt 인증용
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name hangwithus.xyz;

    ssl_certificate /etc/letsencrypt/live/hangwithus.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hangwithus.xyz/privkey.pem;

    # uploaded photos (shared volume with api container)
    location /uploads/ {
        alias /uploads/;
    }

    # proxy API to Go backend
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20M;
    }

    # serve React SPA — index.html must not be cached so browsers pick up new JS bundles
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # JS/CSS assets have content-hash filenames — cache aggressively
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
