services:
  api:
    build: ./api
    restart: always
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/auth/nicknames"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      args:
        VITE_GOOGLE_MAPS_KEY: ${VITE_GOOGLE_MAPS_KEY}
    restart: always
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - uploads:/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  uploads:
