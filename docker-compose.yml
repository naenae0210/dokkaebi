services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: hangwith
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hangwith
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hangwith"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    restart: always
    environment:
      DATABASE_URL: postgresql://hangwith:${DB_PASSWORD}@postgres:5432/hangwith
    volumes:
      - uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: .
    restart: always
    ports:
      - "80:80"
    volumes:
      - uploads:/uploads:ro
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
