services:
  api:
    build: ./api
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/uploads

  web:
    build:
      context: .
      args:
        VITE_GOOGLE_MAPS_KEY: ${VITE_GOOGLE_MAPS_KEY}
    restart: always
    ports:
      - "80:80"
    volumes:
      - uploads:/uploads:ro
    depends_on:
      - api

volumes:
  uploads: