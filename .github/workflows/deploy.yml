name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - 'docker-compose.yml'
            web:
              - 'src/**'
              - 'nginx/**'
              - 'public/**'
              - 'index.html'
              - 'Dockerfile'
              - 'vite.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'tailwind.config.js'
              - 'postcss.config.js'
              - 'tsconfig*.json'
              - 'docker-compose.yml'

  deploy:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BUILD_API: ${{ needs.changes.outputs.api }}
          BUILD_WEB: ${{ needs.changes.outputs.web }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: BUILD_API,BUILD_WEB
          command_timeout: 30m
          script: |
            set -e
            cd ~/dokkaebi

            git fetch origin
            git reset --hard origin/main

            # 변경된 서비스만 순차 빌드 (동시 빌드 시 1GB RAM OOM 방지)
            if [ "$BUILD_API" = "true" ]; then
              echo "=== building api ==="
              docker compose build api
              docker compose up -d api
            fi

            if [ "$BUILD_WEB" = "true" ]; then
              echo "=== building web ==="
              docker compose build web
              docker compose up -d web
            fi

            sleep 8
            curl -sf http://localhost/api/auth/nicknames > /dev/null

            docker image prune -f
