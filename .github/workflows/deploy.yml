name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/dokkaebi

            # 최신 코드 받기
            git fetch origin
            git reset --hard origin/main

            # .env는 VM에서 직접 관리 — 배포 시 건드리지 않음

            # api, web 순차 빌드 (동시 빌드 시 1GB RAM 서버 OOM 발생)
            docker compose build api
            docker compose build web

            # 컨테이너 재시작
            docker compose up -d

            # 서비스 기동 대기 후 헬스체크
            sleep 8
            curl -sf http://localhost/api/auth/nicknames > /dev/null

            # 빌드 캐시 및 오래된 이미지 정리
            docker builder prune -f && docker image prune -f
