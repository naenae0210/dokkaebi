name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/dokkaebi

            # 최신 코드 받기 (VM 로컬 커밋 무시하고 origin/main으로 강제 맞춤)
            git fetch origin
            git reset --hard origin/main

            # .env는 VM에서 직접 관리 — 배포 시 건드리지 않음

            # 빌드 후 재시작 (다운타임 최소화)
            docker compose pull
            docker compose up -d --build

            # 오래된 이미지 정리
            docker image prune -f
